name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check
        run: cargo check
      - name: Test (no PyO3)
        run: cargo test
      - name: Test with PyO3
        run: cargo test --features pyo3/extension-module

  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install maturin
        run: pip install maturin pytest
      - name: Create virtualenv
        run: python -m venv .venv && . .venv/bin/activate

      - name: Build wheel
        run: |
          . .venv/bin/activate
          maturin develop --release
      - name: Pure Python fallback tests
        run: python tests/test_python.py
      - name: Pytest with native extension
        run: pytest tests/test_python.py -v

  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run benchmarks
        run: cargo bench -- --output-format bencher | tee bench_results.txt
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: bench_results.txt

  publish-check:
    runs-on: ubuntu-latest
    needs: [rust-tests, python-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist
        run: |
          pip install maturin
          maturin sdist
      - name: Build wheel
        run: maturin build --release
